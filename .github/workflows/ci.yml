name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install system dependencies (OpenCV)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install python dependencies
        run: |
          pip install --upgrade pip
          pip install -e "./backend[dev]"
          pip install python-multipart

      - name: Run test suite
        run: |
          pytest backend/tests/ -v
        env:
          PYTHONPATH: "."

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      # Skip lint check if eslint configuration needs specific setup, or run it
      - name: Build production bundle
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: |
          docker build -t percv-backend -f backend/Dockerfile .

      - name: Build Frontend Docker Image
        run: |
          docker build -t percv-frontend --build-arg VITE_API_URL=http://localhost:8000 -f frontend/Dockerfile .
